<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Crypto Referral App</title>
    <style>
        body {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            font: 14px/20px "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 20px;
            color-scheme: var(--tg-color-scheme);
        }
        main {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        button {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        input[type="text"] {
            width: calc(100% - 22px);
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        #dashboard-section, #registration-section {
            padding: 20px;
            border: 1px solid var(--tg-theme-secondary-bg-color, #efeff4);
            border-radius: 10px;
            background-color: var(--tg-theme-bg-color, #ffffff);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <main>
        <div align="center" style="margin-bottom: 20px;">
            <img width="60" src="./assets/tapps.png" alt="logo of telegram web apps">
        </div>

        <div id="registration-section" style="display: none;">
            <h1>Welcome!</h1>
            <p>Join our community to start earning tokens by referring your friends.</p>
            <button id="register-button">Register Now</button>
        </div>

        <div id="dashboard-section" style="display: none;">
            <h1>Your Dashboard</h1>
            <p>Welcome, <b id="username"></b>!</p>
            <p>Your referral link:</p>
            <input type="text" id="invitation-link" readonly>
            <p>You have referred <b id="referrals-count">0</b> users.</p>
            <p>Your token balance is <b id="tokens-balance">0</b> tokens.</p>
        </div>

        <div id="loading-section">
            <p>Loading your data...</p>
        </div>
    </main>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const registrationSection = document.getElementById('registration-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const loadingSection = document.getElementById('loading-section');
        const registerButton = document.getElementById('register-button');

        const usernameEl = document.getElementById('username');
        const invitationLinkEl = document.getElementById('invitation-link');
        const referralsCountEl = document.getElementById('referrals-count');
        const tokensBalanceEl = document.getElementById('tokens-balance');

        let currentUser = null;
        let referrerId = null;

        async function fetchUserData(telegramId) {
            try {
                const response = await fetch(`/api/user/${telegramId}`);
                if (response.status === 404) {
                    return null; // User not found
                }
                if (!response.ok) {
                    throw new Error('Failed to fetch user data');
                }
                return await response.json();
            } catch (error) {
                console.error('Error fetching user data:', error);
                tg.showAlert('Could not fetch your data. Please try again later.');
                return null;
            }
        }

        async function registerUser(telegramId, username, referrerId) {
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        telegram_id: telegramId,
                        username: username,
                        referrer_telegram_id: referrerId
                    })
                });
                if (!response.ok) {
                    throw new Error('Registration failed');
                }
                return true;
            } catch (error) {
                console.error('Error registering user:', error);
                tg.showAlert('Registration failed. Please try again.');
                return false;
            }
        }

        function updateDashboard(user) {
            usernameEl.textContent = user.username || 'Anonymous';
            invitationLinkEl.value = user.invitationLink;
            referralsCountEl.textContent = user.referrals;
            tokensBalanceEl.textContent = user.tokens;

            loadingSection.style.display = 'none';
            registrationSection.style.display = 'none';
            dashboardSection.style.display = 'block';
        }

        async function main() {
            // Use real Telegram data
            const initData = tg.initDataUnsafe;
            if (!initData || !initData.user) {
                 // Mock data for local testing if needed
                 console.log("Running in dev mode (no Telegram user data)");
                 currentUser = { id: 123, username: 'dev_user' };
                 referrerId = null;
            } else {
                currentUser = initData.user;
                if (initData.start_param) {
                    referrerId = initData.start_param;
                }
            }

            const user = await fetchUserData(currentUser.id);

            if (user) {
                updateDashboard(user);
            } else {
                // User is not registered
                loadingSection.style.display = 'none';
                registrationSection.style.display = 'block';
            }
        }

        registerButton.addEventListener('click', async () => {
            registerButton.disabled = true;
            registerButton.textContent = 'Registering...';
            const success = await registerUser(currentUser.id, currentUser.username, referrerId);
            if (success) {
                const newUser = await fetchUserData(currentUser.id);
                if (newUser) {
                    updateDashboard(newUser);
                } else {
                    tg.showAlert('Registration complete, but we could not load your dashboard. Please restart the app.');
                }
            } else {
                registerButton.disabled = false;
                registerButton.textContent = 'Register Now';
            }
        });

        // Handle theme changes
        tg.onEvent('themeChanged', function() {
            document.body.setAttribute('style', '--bg-color:' + tg.backgroundColor + '; --text-color:' + tg.textColor);
        });

        main();
    </script>
</body>
</html>
